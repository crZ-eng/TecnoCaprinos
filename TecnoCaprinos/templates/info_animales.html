{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoCaprinos - Info Animales</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Besley&display=swap" rel="stylesheet">

    <style>
        :root {
            --cafe-fondo: #7a5230;
            --beige-botones: #c5a373;
            --blanco: #ffffff;
            --bg-principal: #C9A06D;
            --bg-cuadros: #EAD4B8;
            --color-trazos: #7F5637;
            --white: #f8f8f8;
        }



        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-principal);
            margin: 0;
            color: black;
            overflow-x: hidden;
            /* Evita scroll horizontal */
        }

        /* HEADER RESPONSIVO */
        .white-header {
            background-color: var(--blanco);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 5%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            gap: 10px;
        }

        .logo-container img {
            height: 60px;
            width: auto;
        }

        .header-title {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            /* Tamaño fluido según pantalla */
            font-weight: 600;
            color: var(--bg-cuadros);
            -webkit-text-stroke: 1px var(--color-trazos);
            margin: 0;
            text-align: center;
            flex-grow: 1;
        }

        .irDashboard svg {
            width: 50px;
            height: 50px;
            transition: transform 0.2s;
        }

        /* GRID RESPONSIVO */
        .grid-categorias {
            display: grid;
            /* Se adapta automáticamente: mínimo 150px, máximo 1 fracción */
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
            justify-items: center;
        }

        .categoria-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .circulo {
            width: clamp(140px, 20vw, 180px);
            height: clamp(140px, 20vw, 180px);
            border-radius: 50%;
            border: 6px solid var(--blanco);
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #ddd;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .circulo:hover {
            transform: scale(1.05);
        }

        .circulo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* TÍTULOS */
        .categoria-item h3 {
            text-transform: uppercase;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin: 0;
            letter-spacing: 1px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* BOTÓN LISTAR */
        .btn-listar {
            background-color: var(--beige-botones);
            color: #5d3a1a;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            width: fit-content;
            transition: 0.3s ease;

            display: block;
            margin: 50px auto 0 auto;
        }

        .btn-listar:hover {
            transform: scale(1.05);
        }

        /* AJUSTES PARA MÓVILES PEQUEÑOS */
        @media (max-width: 480px) {
            .white-header {
                padding: 10px 3%;
            }

            .logo-container img {
                height: 45px;
            }

            .irDashboard svg {
                width: 40px;
                height: 40px;
            }

            .grid-categorias {
                grid-template-columns: repeat(2, 1fr);
                /* 2 columnas en móviles */
                gap: 15px;
                padding: 20px 3%;
            }

            .circulo {
                width: 120px;
                height: 120px;
                border-width: 4px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="white-header">
        <div class="logo-container">

            <a href="{% url 'info_animales' %}">
            <img src="{% static 'logo.jpeg' %}" alt="Logo">
            </a>
            
        </div>

        <h1 class="header-title">TECNOCAPRINOS</h1>

        <a href="{% url 'dashboard' %}" class="irDashboard" title="Mi Perfil">
            <svg viewBox="0 0 24 24" fill="#c5a373">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 4-6 8-6s8 2 8 6" />
            </svg>
        </a>
    </header>


    <!-- CATEGORÍAS -->
    <main class="grid-categorias">

        <div class="categoria-item">
            <div class="circulo">
                <a href="{% url 'cinta' %}">
                    <img src="{% static 'cinta.jpg' %}" alt="En cinta">
                </a>
            </div>
            <h3>EN CINTA</h3>
        </div>

        <div class="categoria-item">
            <div class="circulo">
                <a href="{% url 'vacunas' %}">
                    <img src="{% static 'vacunas.jpg' %}" alt="Vacunas">
                </a>
            </div>
            <h3>VACUNAS</h3>
        </div>

        <div class="categoria-item">
            <div class="circulo">
                <a href="{% url 'enfermas' %}">
                    <img src="{% static 'enfermas.jpg' %}" alt="Enfermas">
                </a>
            </div>
            <h3>ENFERMAS</h3>
        </div>

        <div class="categoria-item">
            <div class="circulo">
                <a href="{% url 'produccion' %}">
                    <img src="{% static 'produccion.jpg' %}" alt="Producción">
                </a>
            </div>
            <h3>PRODUCCIÓN</h3>
        </div>

    </main>

    <!-- BOTÓN CABRAS REGISTRADAS -->
    <a href="{% url 'listar' %}" class="btn-listar">
        VER MIS CABRAS REGISTRADAS
    </a>

</body>

</html>
