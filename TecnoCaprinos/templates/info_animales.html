{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoCaprinos - Info Animales</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cafe-fondo: #7a5230; 
            --beige-botones: #c5a373;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--cafe-fondo);
            margin: 0;
            color: var(--blanco);
        }

        /* HEADER BLANCO */
        .white-header {
            background-color: var(--blanco);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 5%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo-container img {
            height: 60px;
        }

        .header-title {
            color: var(--cafe-fondo);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .btn-info {
            background-color: var(--cafe-fondo);
            color: var(--blanco);
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* BARRA DE BÚSQUEDA */
        .search-container {
            padding: 30px 5%;
        }

        .search-bar {
            background-color: var(--beige-botones);
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            border: none;
        }

        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: #5d3a1a;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            width: 100%;
        }

        .search-bar input::placeholder {
            color: rgba(93, 58, 26, 0.7);
        }

        /* GRID DE CATEGORÍAS */
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            padding: 20px 5%;
            text-align: center;
        }

        .categoria-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circulo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid var(--blanco);
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #ddd;
        }

        .circulo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .categoria-item h3 {
            text-transform: uppercase;
            font-size: 1.4rem;
            margin: 0;
            letter-spacing: 1px;
        }

        /* BOTÓN AÑADIR */
        .btn-añadir {
            background-color: var(--beige-botones);
            color: #5d3a1a;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 600;
            display: inline-block;
            margin: 40px 5%;
            transition: transform 0.2s;
        }

        .btn-añadir:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .grid-categorias {
                grid-template-columns: repeat(2, 1fr);
            }
            .circulo {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="white-header">
        <div class="logo-container">
            <img src="{% static 'logoCompleto.jpeg' %}" alt="Logo">
        </div>
        <h1 class="header-title">TECNOCAPRINOS</h1>
        <a href="{% url 'dashboard' %}" class="btn-info">Datos de usuario</a>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <span>🔍 </span>
            <input type="text" placeholder="Barra de busqueda">
        </div>
    </div>

    <div class="grid-categorias">
        
        <div class="categoria-item">
            <div class="circulo">
                <img src="{% static 'cinta.jpg' %}" alt="En cinta">
            </div>
            <h3>EN CINTA</h3>
        </div>

        <div class="categoria-item">
            <div class="circulo">
                <img src="{% static 'vacunas.jpg' %}" alt="Vacunas">
            </div>
            <h3>VACUNAS</h3>
        </div>

        <div class="categoria-item">
            <div class="circulo">
                <img src="{% static 'enfermas.jpg' %}" alt="Enfermas">
            </div>
            <h3>ENFERMAS</h3>
        </div>

        <div class="categoria-item">
            <div class="circulo">
                <img src="{% static 'produccion.jpg' %}" alt="Producción">
            </div>
            <h3>PRODUCCION</h3>
        </div>

    </div>

    <a href="#" class="btn-añadir">añadir +</a>

</body>
</html>
