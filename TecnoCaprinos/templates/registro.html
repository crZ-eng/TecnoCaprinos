<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganado Digital - Registro</title>

    <link rel="icon" href="{% static 'logo.jpeg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Besley&display=swap" rel="stylesheet">

    <style>
        /* ===== BODY (IGUAL AL LOGIN) ===== */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #6f4a2d; /* Color café oscuro del login */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden; /* Evita scrolls raros de lado */
        }

        /* ===== CONTENEDOR GENERAL ===== */
        /* Al usar flex-row y un max-width, garantizamos que mantengan distancia en PC */
        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 80px; /* Distancia fija sagrada entre el formulario y la cabra */
            width: 90%;
            max-width: 1300px;
            padding: 40px 0;
            box-sizing: border-box;
        }

        /* ===== BLOQUE DE REGISTRO ===== */
        .register-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0; /* Impide que el formulario se aplaste si se achica la pantalla */
        }

        /* ===== FORMULARIO (ESTILO LOGIN COMPACTO) ===== */
        form {
            background: #EAD4B8;
            padding: 40px 30px;
            border-radius: 35px;
            width: 320px;
            border: 8px solid #C9A06D;
            box-shadow: 0 20px 30px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        form h2 {
            text-align: center;
            color: #7F5637;
            font-family: 'Bagel Fat One', cursive;
            font-size: 30px;
            margin: 0;
        }

        /* ===== INPUTS ===== */
        input {
            width: 91%;
            padding: 14px;
            border-radius: 25px;
            border: none;
            background: #C9A06D;
            color: #7F5637;
            font-family: 'Besley', serif;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #7F5637;
            opacity: 0.7;
        }

        /* ===== BOTÓN ===== */
        .btn {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn button {
            background: #7F5637;
            color: #F2EDDF;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Bagel Fat One', cursive;
            font-size: 16px;
            transition: 0.3s;
        }

        /* ===== LINKS ===== */
        .links {
            margin-top: 20px;
            text-align: center;
        }

        .link {
            display: block;
            color: #F2EDDF;
            font-family: 'Besley', serif;
            text-decoration: none;
            margin: 5px 0;
            font-size: 14px;
        }

        /* ===== IMAGEN (PC - FLUJO NATURAL) ===== */
        /* Al quitar fixed y absolute, se alinea al lado derecho sin flotar sobre el form */
        .imagen {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            max-width: 600px; /* Controla el tamaño máximo en pantallas gigantes */
        }

        .imagen img {
            width: 100%;
            max-width: 550px;
            height: auto;
            aspect-ratio: 1 / 1; /* Mantiene proporción cuadrada perfecta */
            object-fit: cover;
            border-radius: 50%; /* Círculo completo impecable */
            border: 10px solid #EAD4B8;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }

        /* ==========================================================
        ===== RESPONSIVE GENERAL (TABLETS Y MÓVILES - ABAJO DE 1024px) =====
        ========================================================== */
        @media (max-width: 1024px) {
            body {
                align-items: flex-start;
                overflow-y: auto; /* Scroll si falta espacio en pantallas bajas */
            }

            .container {
                flex-direction: column-reverse; /* Pone el formulario arriba y la cabra abajo */
                gap: 30px; /* Espaciado controlado en móviles */
                padding: 30px 0;
            }

            /* --- CABRA EN RESPONSIVE (COMPLETA Y MEDIANA) --- */
            .imagen {
                max-width: 100%;
                margin-top: 10px;
            }

            .imagen img {
                width: 180px; /* Tamaño medio ideal sin cortarse con los bordes */
                max-width: 180px;
                border: 6px solid #EAD4B8;
            }
        }

        /* Ajustes menores para pantallas muy chicas de celular */
        @media (max-width: 480px) {
            .register-box {
                width: 290px;
            }
            form {
                padding: 25px 20px;
            }
            .imagen img {
                width: 150px; /* Ligeramente más pequeña en celulares clásicos */
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="register-box">
            <form method="POST">
                {% csrf_token %}
                <h2>Registrarse</h2>

                <input type="text" name="nombre" placeholder="Nombre completo" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Contraseña" required>

                <div class="btn">
                    <button type="submit">registrarse</button>
                </div>

                {% if mensaje %}
                    <p style="color: red; text-align: center; font-size: 12px;">{{ mensaje }}</p>
                {% endif %}
            </form>

            <div class="links">
                <p class="link" style="color: #F2EDDF;">¿Ya tienes cuenta?</p>
                <a href="{% url 'login' %}" class="link" style="text-decoration: underline;">Inicia sesión aquí</a>
            </div>
        </div>

        <div class="imagen">
            <img src="{% static 'cabra_registro.jpg' %}" alt="cabra">
        </div>

    </div>

</body>
</html>
