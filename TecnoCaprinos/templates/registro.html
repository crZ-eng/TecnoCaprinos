<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganado Digital - Registro</title>

    <link rel="icon" href="{% static 'logo.jpeg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Besley&display=swap" rel="stylesheet">

    <style>
        /* ===== BODY (IGUAL AL LOGIN) ===== */
        body {
            position: fixed; 
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #6f4a2d; /* Color café oscuro del login */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* ===== CONTENEDOR GENERAL ===== */
        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            height: 500px;
            padding-left: 80px;
            padding-right: 0;
            position: relative;
        }

        /* ===== BLOQUE DE REGISTRO ===== */
        .register-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* ===== FORMULARIO (ESTILO LOGIN COMPACTO) ===== */
        form {
            background: #EAD4B8;
            padding: 40px 30px;
            border-radius: 35px;
            width: 320px;
            border: 8px solid #C9A06D;
            box-shadow: 0 20px 30px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-left: 150px; /* Consistencia con tu login */
        }

        form h2 {
            text-align: center;
            color: #7F5637;
            font-family: 'Bagel Fat One', cursive;
            font-size: 30px;
            margin: 0;
        }

        /* ===== INPUTS ===== */
        input {
            width: 91%;
            padding: 14px;
            border-radius: 25px;
            border: none;
            background: #C9A06D;
            color: #7F5637;
            font-family: 'Besley', serif;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #7F5637;
            opacity: 0.7;
        }

        /* ===== BOTÓN ===== */
        .btn {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn button {
            background: #7F5637;
            color: #F2EDDF;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Bagel Fat One', cursive;
            font-size: 16px;
            transition: 0.3s;
        }

        /* ===== LINKS ===== */
        .links {
            margin-top: 20px;
            margin-left: 150px;
            text-align: center;
        }

        .link {
            display: block;
            color: #F2EDDF;
            font-family: 'Besley', serif;
            text-decoration: none;
            margin: 5px 0;
            font-size: 14px;
        }

        /* ===== IMAGEN (PC) ===== */
        .imagen {
            position: fixed;
            right: -150px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 0;
        }

        .imagen img {
            width: 960px;
            height: 900px;
            object-fit: cover;
            border-radius: 50% 0% 0% 50%;
            border: 10px solid #EAD4B8;
        }

        /* ===========================================
        ===== MÓVIL (SISTEMA RESPONSIVE IGUAL) =====
           =========================================== */
        @media (max-width: 480px) {
            body {
                position: relative;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding-top: 40px; /* Un poco más arriba para que quepa el form de registro */
                overflow: hidden;
            }

            .container {
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding: 0;
            }

            .register-box {
                width: 280px;
                margin-left: 0;
            }

            form {
                width: 100%;
                padding: 25px 20px;
                margin-left: 0; /* Centra el form */
                border: 6px solid #C9A06D;
                gap: 10px;
            }

            form h2 {
                font-size: 22px;
            }

            input {
                width: 100%;
                padding: 10px;
                font-size: 13px;
                box-sizing: border-box;
            }

            .links {
                margin-left: 0;
                margin-top: 15px;
            }

            /* --- CABRA INFERIOR (SEMICÍRCULO) --- */
            .imagen {
                display: flex !important;
                position: fixed;
                bottom: -220px; /* Posición para alejar de las letras */
                right: auto;
                left: 50%;
                top: auto;
                transform: translateX(-50%);
                z-index: 1;
            }

            .imagen img {
                width: 400px;
                height: 400px;
                border-radius: 50%;
                border: 8px solid #EAD4B8;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="register-box">
            <form method="POST">
                {% csrf_token %}
                <h2>Registrarse</h2>

                <input type="text" name="nombre" placeholder="Nombre completo" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Contraseña" required>

                <div class="btn">
                    <button type="submit">registrarse</button>
                </div>

                {% if mensaje %}
                    <p style="color: red; text-align: center; font-size: 12px;">{{ mensaje }}</p>
                {% endif %}
            </form>

            <div class="links">
                <p class="link" style="color: #F2EDDF;">¿Ya tienes cuenta?</p>
                <a href="{% url 'login' %}" class="link" style="text-decoration: underline;">Inicia sesión aquí</a>
            </div>
        </div>

        <div class="imagen">
            <img src="{% static 'cabra_registro.jpg' %}" alt="cabra">
        </div>

    </div>

</body>
</html>
