<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganado Digital - Iniciar Sesión</title>

    <link rel="icon" href="{% static 'logo.jpeg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Besley&display=swap" rel="stylesheet">

    <style>
        /* ===== BODY ===== */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #6f4a2d; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden; 
        }

        /* ===== CONTENEDOR GENERAL (AJUSTADO PARA CLONAR IMAGE_21D60B.JPG) ===== */
        /* Cambiado a width: auto para que el formulario y la cabra se queden juntos en el centro */
        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 80px; /* Separación exacta entre los dos bloques */
            width: auto; 
            padding: 40px;
            box-sizing: border-box;
        }

        /* ===== BLOQUE DE LOGIN ===== */
        .login-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0; 
        }

        /* ===== FORMULARIO ===== */
        form {
            background: #EAD4B8;
            padding: 40px 30px;
            border-radius: 35px;
            width: 320px;
            border: 8px solid #C9A06D;
            box-shadow: 0 20px 30px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        form h2 {
            text-align: center;
            color: #7F5637;
            font-family: 'Bagel Fat One', cursive;
            font-size: 30px;
            margin: 0;
        }

        /* ===== INPUTS ===== */
        input {
            width: 91%;
            padding: 14px;
            border-radius: 25px;
            border: none;
            background: #C9A06D;
            color: #7F5637;
            font-family: 'Besley', serif;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #7F5637;
            opacity: 0.7;
        }

        /* ===== BOTÓN ===== */
        .btn {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn button {
            background: #7F5637;
            color: #F2EDDF;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Bagel Fat One', cursive;
            font-size: 16px;
            transition: 0.3s;
        }

        /* ===== LINKS ===== */
        .links {
            margin-top: 20px;
            text-align: center;
        }

        .link {
            display: block;
            color: #F2EDDF;
            font-family: 'Besley', serif;
            text-decoration: none;
            margin: 5px 0;
            font-size: 14px;
        }

        /* ===== IMAGEN (PC - FLUJO NATURAL CENTRAL) ===== */
        .imagen {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .imagen img {
            width: 450px; /* Tamaño ideal y controlado para que se vea igual a la foto */
            height: 450px;
            object-fit: cover;
            border-radius: 50%; 
            border: 10px solid #EAD4B8;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }

        /* ==========================================================
        ===== RESPONSIVE GENERAL (REMANENTE SIN TOCAR EL ESCRITORIO) =====
        ========================================================== */
        @media (max-width: 1024px) {
            body {
                align-items: flex-start;
                overflow-y: auto; 
            }

            .container {
                flex-direction: column-reverse; 
                gap: 30px; 
                padding: 30px 0;
                width: 100%;
            }

            .imagen {
                max-width: 100%;
                margin-top: 10px;
            }

            .imagen img {
                width: 180px; 
                height: 180px;
                border: 6px solid #EAD4B8;
            }
        }

        @media (max-width: 480px) {
            .login-box {
                width: 290px;
            }
            form {
                padding: 25px 20px;
            }
            .imagen img {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- BLOQUE DE LOGIN -->
        <div class="login-box">
            <form method="POST">
                {% csrf_token %}
                <h2>Iniciar Sesión</h2>

                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Contraseña" required>

                <div class="btn">
                    <button type="submit">iniciar sesión</button>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <p style="color: red; text-align: center; font-size: 12px; margin-top: 10px;">{{ message }}</p>
                    {% endfor %}
                {% endif %}
            </form>

            <div class="links">
                <a href="#" class="link">¿Olvidaste tu Contraseña?</a>
                <a href="{% url 'registro' %}" class="link" style="text-decoration: underline;">¿No tienes cuenta? regístrate</a>
            </div>
        </div>

        <!-- LADO DERECHO (IMAGEN COPIADA DE IMAGE_21D60B.JPG) -->
        <div class="imagen">
            <img src="{% static 'cabrafeliz.jpg' %}" alt="cabra">
        </div>

    </div>

</body>
</html>
