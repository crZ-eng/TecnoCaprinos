<!DOCTYPE html>
<html lang="es">

<head>

    {% load static %}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TecnoCaprinos - Registro</title>

    <link rel="icon" href="{% static 'logo.jpeg' %}">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>

        :root {
            --bg-principal: #C9A06D;
            --bg-cuadros: #EAD4B8;
            --color-trazos: #7F5637;
            --white: #f8f8f8;
        }

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-principal);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================
            HEADER
        ========================== */

        .white-header {
            width: 100%;
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 50px;
            border-bottom: 4px solid var(--color-trazos);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-container img {
            height: 65px;
        }

        .header-title {
            font-size: 2.4rem;
            font-weight: 600;
            color: var(--bg-cuadros);
            -webkit-text-stroke: 1.5px var(--color-trazos);
            text-transform: uppercase;
        }

        /* =========================
            CONTENIDO
        ========================== */

        .page-content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            padding: 50px 20px;
            max-width: 1300px;
            width: 95%;
        }

        /* =========================
            COLUMNA IZQUIERDA
        ========================== */

        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .section-title {
            color: var(--white);
            font-size: 3rem;
            margin-bottom: 25px;
            -webkit-text-stroke: 2px var(--color-trazos);
            text-transform: uppercase;
        }

        .image-placeholder {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-cuadros);
            border: 6px solid var(--color-trazos);
            border-radius: 35px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .image-placeholder img {
            width: 100%;
            border-radius: 20px;
        }

        .welcome-text {
            color: var(--color-trazos);
            font-size: 1.1rem;
            line-height: 1.7;
            max-width: 500px;
            font-weight: 600;
        }

        /* =========================
            FORMULARIO
        ========================== */

        .form-container {
            flex: 1.1;
            background-color: var(--bg-cuadros);
            border: 6px solid var(--color-trazos);
            border-radius: 40px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .form-title {
            color: var(--white);
            font-size: 2.3rem;
            text-align: center;
            margin-bottom: 30px;
            -webkit-text-stroke: 1.5px var(--color-trazos);
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            color: var(--color-trazos);
            font-weight: 600;
            margin-bottom: 7px;
            margin-left: 8px;
            font-size: 1rem;
        }

        input,
        select,
        textarea {
            background-color: #fffaf3;
            border: 3px solid var(--color-trazos);
            border-radius: 16px;
            padding: 12px 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            color: var(--color-trazos);
            outline: none;
            transition: 0.2s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            transform: scale(1.01);
            background-color: white;
        }

        input[type="file"] {
            padding: 10px;
            background-color: white;
            cursor: pointer;
        }

        /* =========================
            PREVIEW IMAGEN
        ========================== */

        .preview-container{
            margin-top: 15px;
            text-align: center;
        }

        #preview {
            width: 100%;
            max-width: 250px;
            border-radius: 20px;
            border: 4px solid var(--color-trazos);
            display: none;
        }

        /* =========================
            BOTONES
        ========================== */

        .buttons-container{
            grid-column: span 2;
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-submit,
        .btn-volver {

            flex: 1;
            padding: 14px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            transition: 0.25s ease;
            text-align: center;
            text-decoration: none;
            border: none;
        }

        .btn-submit {
            background-color: var(--color-trazos);
            color: white;
        }

        .btn-volver {
            background-color: #ab7b41;
            color: white;
        }

        .btn-submit:hover,
        .btn-volver:hover {
            transform: scale(1.02);
        }

        /* =========================
            RESPONSIVE
        ========================== */

        @media (max-width: 950px) {

            .page-content {
                flex-direction: column;
                align-items: center;
            }

            .left-column,
            .form-container {
                width: 100%;
                max-width: 700px;
            }

        }

        @media (max-width: 700px){

            .white-header{
                justify-content: center;
                text-align: center;
                padding: 15px 20px;
            }

            .header-title{
                font-size: 1.8rem;
            }

            .section-title{
                font-size: 2.3rem;
            }

            .form-container{
                padding: 25px;
                border-radius: 30px;
            }

            .form-grid{
                grid-template-columns: 1fr;
            }

            .full-width,
            .buttons-container{
                grid-column: span 1;
            }

            .buttons-container{
                flex-direction: column;
            }

        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="white-header">

        <div class="logo-container">

            <img 
                src="{% static 'logo.jpeg' %}" 
                alt="Logo TecnoCaprinos"
            >

        </div>

        <h1 class="header-title">
            TECNOCAPRINOS
        </h1>

        <div style="width: 60px;"></div>

    </div>

    <!-- CONTENIDO -->

    <div class="page-content">

        <!-- COLUMNA IZQUIERDA -->

        <div class="left-column">

            <h2 class="section-title">
                Bienvenido
            </h2>

            <div class="image-placeholder">

                <img 
                    src="{% static 'img1.webp' %}" 
                    alt="Cabra animada"
                >

            </div>

            <p class="welcome-text">

                Hola,
                <strong>{{ user.username }}</strong>

                En esta sección puedes agregar nuevos integrantes
                a tu hato caprino.

            </p>

        </div>

        <!-- FORMULARIO -->

        <div class="form-container">

            <h3 class="form-title">
                Registrar Nueva Cabra
            </h3>

            <form 
                method="POST"
                enctype="multipart/form-data"
                class="form-grid"
            >

                {% csrf_token %}

                <!-- CODIGO -->

                <div class="form-group">

                    <label>Código:</label>

                    <input 
                        type="text"
                        name="cod"
                        placeholder="Código de la Cabra"
                        required
                    >

                </div>

                <!-- NOMBRE -->

                <div class="form-group">

                    <label>Nombre:</label>

                    <input 
                        type="text"
                        name="nombre"
                        placeholder="Nombre de la Cabra"
                        required
                    >

                </div>

                <!-- FECHA -->

                <div class="form-group">

                    <label>Fecha de Nacimiento:</label>

                    <input 
                        type="date"
                        name="fecha_nacimiento"
                        required
                    >

                </div>

                <!-- RAZA -->

                <div class="form-group">

                    <label>Raza:</label>

                    <input 
                        type="text"
                        name="raza"
                        placeholder="Raza de la Cabra"
                        required
                    >

                </div>

                <!-- PESO -->

                <div class="form-group">

                    <label>Peso (Libras):</label>

                    <input 
                        type="number"
                        name="peso"
                        min="0"
                        placeholder="Peso en Libras"
                        required
                    >

                </div>

                <!-- SEXO -->

                <div class="form-group">

                    <label>Sexo:</label>

                    <select name="sexo" required>

                        <option value="">Seleccione...</option>

                        <option value="M">
                            Macho (Cabro)
                        </option>

                        <option value="F">
                            Hembra (Cabra)
                        </option>

                    </select>

                </div>

                <!-- COLOR -->

                <div class="form-group">

                    <label>Color:</label>

                    <select name="color" required>

                        <option value="">Seleccione...</option>

                        <option value="blanco">Blanco</option>
                        <option value="negro">Negro</option>
                        <option value="marron">Marrón</option>
                        <option value="gris">Gris</option>
                        <option value="beige">Beige</option>
                        <option value="manchado">Manchado</option>
                        <option value="tricolor">Tricolor</option>
                        <option value="pinto">Pinto</option>
                        <option value="rojizo">Rojizo</option>
                        <option value="crema">Crema</option>
                        <option value="atigrado">Atigrado</option>
                        <option value="moteado">Moteado</option>

                    </select>

                </div>

                <!-- MADRE -->

                <div class="form-group">

                    <label>Código de la Madre:</label>

                    <input 
                        type="text"
                        name="cod_madre"
                        placeholder="Código de la Cabra Madre"
                        required
                    >

                </div>

                <!-- PADRE -->

                <div class="form-group">

                    <label>Código del Padre:</label>

                    <input 
                        type="text"
                        name="cod_padre"
                        placeholder="Código del Cabro Padre"
                        required
                    >

                </div>

                <!-- CATEGORIA -->

                <div class="form-group">

                    <label>Categoría:</label>

                    <select name="categoria" required>

                        <option value="">
                            Seleccione...
                        </option>

                        <option value="cinta">
                            En cinta
                        </option>

                        <option value="enferma">
                            Enferma
                        </option>

                        <option value="vacunas">
                            Vacunas
                        </option>

                        <option value="produccion">
                            Producción
                        </option>

                    </select>

                </div>

                <!-- FOTO -->

                <div class="form-group full-width">

                    <label>Foto de la Cabra:</label>

                    <input 
                        type="file"
                        name="foto"
                        accept="image/*"
                        required
                        id="fotoInput"
                    >

                    <!-- PREVIEW -->

                    <div class="preview-container">

                        <img 
                            id="preview"
                            alt="Vista previa"
                        >

                    </div>

                </div>

                <!-- BOTONES -->

                <div class="buttons-container">

                    <button type="submit" class="btn-submit">

                        GUARDAR REGISTRO

                    </button>

                    <a 
                        href="{% url 'info_animales' %}"
                        class="btn-volver"
                    >

                        VOLVER

                    </a>

                </div>

            </form>

        </div>

    </div>

    <!-- SCRIPT PREVIEW -->

    <script>

        const inputFoto = document.getElementById("fotoInput");

        const preview = document.getElementById("preview");

        inputFoto.addEventListener("change", function(){

            const archivo = this.files[0];

            if(archivo){

                preview.src = URL.createObjectURL(archivo);

                preview.style.display = "block";

            }

        });

    </script>

</body>

</html>
