<!DOCTYPE html>
<html lang="es">

<head>

    {% load static %}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TecnoCaprinos - Registro</title>

    <link rel="icon" href="{% static 'logo.jpeg' %}">

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap"
        rel="stylesheet"
    >

    <style>
        :root {
            --bg-principal: #C9A06D;
            --bg-cuadros: #EAD4B8;
            --color-trazos: #7F5637;
            --white: #f8f8f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-principal);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================
            HEADER
        ========================== */

        .white-header {
            width: 100%;
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 50px;
            border-bottom: 4px solid var(--color-trazos);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-container img {
            height: 65px;
        }

        .header-title {
            font-size: 2.4rem;
            font-weight: 600;
            color: var(--bg-cuadros);
            -webkit-text-stroke: 1.5px var(--color-trazos);
            text-transform: uppercase;
        }

        /* =========================
            CONTENIDO
        ========================== */

        .page-content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            padding: 50px 20px;
            max-width: 1300px;
            width: 95%;
        }

        /* =========================
            COLUMNA IZQUIERDA
        ========================== */

        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .section-title {
            color: var(--white);
            font-size: 3rem;
            margin-bottom: 25px;
            -webkit-text-stroke: 2px var(--color-trazos);
            text-transform: uppercase;
        }

        .image-placeholder {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-cuadros);
            border: 6px solid var(--color-trazos);
            border-radius: 35px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .image-placeholder img {
            width: 100%;
            border-radius: 20px;
        }

        .welcome-text {
            color: var(--color-trazos);
            font-size: 1.1rem;
            line-height: 1.7;
            max-width: 500px;
            font-weight: 600;
        }

        /* =========================
            FORMULARIO
        ========================== */

        .form-container {
            flex: 1.1;
            background-color: var(--bg-cuadros);
            border: 6px solid var(--color-trazos);
            border-radius: 40px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .form-title {
            color: var(--white);
            font-size: 2.3rem;
            text-align: center;
            margin-bottom: 30px;
            -webkit-text-stroke: 1.5px var(--color-trazos);
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            color: var(--color-trazos);
            font-weight: 600;
            margin-bottom: 7px;
            margin-left: 8px;
            font-size: 1rem;
        }

        input,
        select,
        textarea {
            background-color: #fffaf3;
            border: 3px solid var(--color-trazos);
            border-radius: 16px;
            padding: 12px 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            color: var(--color-trazos);
            outline: none;
            transition: 0.2s ease;
            width: 100%; /* Asegura que se adapten al ancho disponible en móviles */
        }

        input:focus,
        select:focus,
        textarea:focus {
            transform: scale(1.01);
            background-color: white;
        }

        input[type="file"] {
            padding: 10px;
            background-color: white;
            cursor: pointer;
        }

        /* =========================
            PREVIEW IMAGEN
        ========================== */

        .preview-container {
            margin-top: 15px;
            text-align: center;
        }

        #preview {
            width: 100%;
            max-width: 250px;
            border-radius: 20px;
            border: 4px solid var(--color-trazos);
            display: none;
        }

        /* =========================
            BOTONES
        ========================== */

        .buttons-container {
            grid-column: span 2;
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-submit,
        .btn-volver {
            flex: 1;
            padding: 14px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            transition: 0.25s ease;
            text-align: center;
            text-decoration: none;
            border: none;
        }

        .btn-submit {
            background-color: var(--color-trazos);
            color: white;
        }

        .btn-volver {
            background-color: #ab7b41;
            color: white;
        }

        .btn-submit:hover,
        .btn-volver:hover {
            transform: scale(1.02);
        }

        /* =========================
            RESPONSIVE
        ========================== */

        @media (max-width: 1024px) {
            .white-header {
                padding: 12px 30px;
            }
            .header-title {
                font-size: 2rem;
            }
            .page-content {
                gap: 30px;
                padding: 30px 15px;
            }
            .section-title {
                font-size: 2.6rem;
            }
        }

        @media (max-width: 950px) {
            .page-content {
                flex-direction: column;
                align-items: center;
            }

            .left-column,
            .form-container {
                width: 100%;
                max-width: 700px;
            }
            
            /* Ocultamos el espaciador vacío del header cuando el diseño cambia */
            .white-header div[style*="width: 60px;"] {
                display: none;
            }
        }

        @media (max-width: 700px) {
            .white-header {
                justify-content: center;
                text-align: center;
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
            }

            .header-title {
                font-size: 1.6rem;
                -webkit-text-stroke: 1px var(--color-trazos);
            }

            .logo-container img {
                height: 55px;
            }

            .section-title {
                font-size: 2.2rem;
                -webkit-text-stroke: 1.5px var(--color-trazos);
            }

            .image-placeholder {
                max-width: 350px;
                border-width: 4px;
                border-radius: 25px;
            }

            .form-container {
                padding: 25px 20px;
                border-radius: 30px;
                border-width: 4px;
            }

            .form-title {
                font-size: 1.8rem;
                margin-bottom: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .full-width,
            .buttons-container {
                grid-column: span 1;
            }

            .buttons-container {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn-submit,
            .btn-volver {
                padding: 12px;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: 1.3rem;
            }
            .section-title {
                font-size: 1.8rem;
            }
            .form-title {
                font-size: 1.5rem;
            }
            label {
                font-size: 0.9rem;
            }
        }
    </style>

</head>

<body>

    <div class="white-header">

        <div class="logo-container">

            <a href="{% url 'info_animales' %}">
                <img
                    src="{% static 'logo.jpeg' %}"
                    alt="Logo TecnoCaprinos"
                >
            </a>

        </div>

        <h1 class="header-title">
            TECNOCAPRINOS
        </h1>

        <div style="width: 60px;"></div>

    </div>
    <div class="page-content">
        <div class="left-column">
            <h2 class="section-title">Bienvenido</h2>
            <div class="image-placeholder">

                <img
                    src="{% static 'img1.webp' %}"
                    alt="Cabra animada"
                >

            </div>

            <p class="welcome-text">

                Hola,
                <strong>{{ user.username }}</strong>

                En esta sección puedes agregar nuevos integrantes
                a tu hato caprino.

            </p>

        </div>

        <div class="form-container">
            <h3 class="form-title">Registrar Nueva Cabra</h3>
            <form method="POST" enctype="multipart/form-data" class="form-grid">
                {% csrf_token %}

                <div class="form-group">

                    <label for="cod">Código:</label>

                    <input
                        type="text"
                        id="cod"
                        name="cod"
                        placeholder="Código de la Cabra"
                        required
                        value="Cod-00"
                    >

                </div>

                <div class="form-group">

                    <label for="nombre">Nombre:</label>

                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Nombre de la Cabra"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="fecha_nacimiento">
                        Fecha de Nacimiento:
                    </label>

                    <input
                        type="date"
                        id="fecha_nacimiento"
                        name="fecha_nacimiento"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="raza">Raza:</label>

                    <select name="raza" id="raza" required>

                        <option value="">
                            Seleccione una raza
                        </option>

                        <option value="Boer">Boer</option>
                        <option value="Saanen">Saanen</option>
                        <option value="Alpina">Alpina</option>
                        <option value="Toggenburg">Toggenburg</option>
                        <option value="Anglonubiana">Anglonubiana</option>
                        <option value="LaMancha">LaMancha</option>
                        <option value="Murciano-Granadina">Murciano-Granadina</option>
                        <option value="Malagueña">Malagueña</option>
                        <option value="Florida">Florida</option>
                        <option value="Payoya">Payoya</option>
                        <option value="Jamnapari">Jamnapari</option>
                        <option value="Beetal">Beetal</option>
                        <option value="Black Bengal">Black Bengal</option>
                        <option value="Kiko">Kiko</option>
                        <option value="Savanna">Savanna</option>
                        <option value="Myotonic">Myotonic</option>
                        <option value="Nigerian Dwarf">Nigerian Dwarf</option>
                        <option value="Pygmy">Pygmy</option>
                        <option value="Oberhasli">Oberhasli</option>
                        <option value="Golden Guernsey">Golden Guernsey</option>
                        <option value="Angora">Angora</option>
                        <option value="Cashmere">Cashmere</option>
                        <option value="Criolla">Criolla</option>
                        <option value="Canaria">Canaria</option>
                        <option value="Verata">Verata</option>
                        <option value="Retinta">Retinta</option>
                        <option value="Blanca Celtibérica">Blanca Celtibérica</option>
                        <option value="Negra Serrana">Negra Serrana</option>
                        <option value="Grisona">Grisona</option>
                        <option value="Rove">Rove</option>
                        <option value="Poitevine">Poitevine</option>
                        <option value="Catalana">Catalana</option>
                        <option value="Corsa">Corsa</option>
                        <option value="Girgentana">Girgentana</option>
                        <option value="Damascus">Damascus</option>
                        <option value="Appenzell">Appenzell</option>
                        <option value="Valais Blackneck">Valais Blackneck</option>
                        <option value="West African Dwarf">West African Dwarf</option>
                        <option value="Barbari">Barbari</option>
                        <option value="Osmanabadi">Osmanabadi</option>
                        <option value="Sirohi">Sirohi</option>
                        <option value="Jakhrana">Jakhrana</option>
                        <option value="Kutchi">Kutchi</option>
                        <option value="Marwari">Marwari</option>
                        <option value="Changthangi">Changthangi</option>
                        <option value="Pashmina">Pashmina</option>
                        <option value="Boer Cruzada">Boer Cruzada</option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Peso (Libras):</label>
                    <input type="number" name="peso" min="0" placeholder="Peso en Libras" required>
                </div>

                <div class="form-group">

                    <label for="sexo">Sexo:</label>

                    <select name="sexo" id="sexo" required>

                        <option value="">
                            Seleccione...
                        </option>

                        <option value="Macho">
                            Macho (Cabro)
                        </option>

                        <option value="Hembra">
                            Hembra (Cabra)
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="color">Color:</label>

                    <select name="color" id="color" required>

                        <option value="">
                            Seleccione...
                        </option>

                        <option value="blanco">Blanco</option>
                        <option value="negro">Negro</option>
                        <option value="marron">Marrón</option>
                        <option value="gris">Gris</option>
                        <option value="beige">Beige</option>
                        <option value="manchado">Manchado</option>
                        <option value="tricolor">Tricolor</option>
                        <option value="pinto">Pinto</option>
                        <option value="rojizo">Rojizo</option>
                        <option value="crema">Crema</option>
                        <option value="atigrado">Atigrado</option>
                        <option value="moteado">Moteado</option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="cod_madre">
                        Código de la Madre:
                    </label>

                    <input
                        type="text"
                        id="cod_madre"
                        name="cod_madre"
                        placeholder="Código de la Cabra Madre"
                        required
                        value="Cod-00"
                    >

                </div>

                <div class="form-group">

                    <label for="cod_padre">
                        Código del Padre:
                    </label>

                    <input
                        type="text"
                        id="cod_padre"
                        name="cod_padre"
                        placeholder="Código del Cabro Padre"
                        required
                        value="Cod-00"
                    >

                </div>

                <div class="form-group">
                    <label>Categoria:</label>
                    <select name="categoria" id="categoria">
                        <option selected>Seleciona una Categoria</option>
                        <option value="cinta">En Cinta</option>
                        <option value="enferma">Enferma</option>
                        <option value="vacunas">Vacunas</option>
                        <option value="produccion">Producción</option>
                        <option value="">Ninguno</option>
                    </select>

                </div>

                <div class="form-group full-width">

                    <label for="fotoInput">
                        Foto de la Cabra:
                    </label>

                    <input
                        type="file"
                        name="foto"
                        id="fotoInput"
                        accept="image/*"
                        required
                    >

                    <div class="preview-container">

                        <img
                            id="preview"
                            alt="Vista previa"
                        >

                    </div>

                </div>

                <div class="buttons-container">
                    <button type="submit" class="btn-submit">GUARDAR REGISTRO</button>
                    <a href="{% url 'info_animales' %}" class="btn-volver">VOLVER</a>
                </div>
            </form>

        </div>

    </div>

    <script>

        const inputFoto = document.getElementById("fotoInput");
        const preview = document.getElementById("preview");

        inputFoto.addEventListener("change", function () {

            const archivo = this.files[0];

            if (archivo) {

                preview.src = URL.createObjectURL(archivo);
                preview.style.display = "block";

            }

        });

    </script>

</body>

</html>
