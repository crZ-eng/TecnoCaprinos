{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoCaprinos - Lista de tus Cabras</title>
    <link rel="icon" href="{% static 'logo.jpeg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        :root {
            --cafe-fondo: #7a5230;
            --beige-botones: #c5a373;
            --blanco: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto);
            min-height: 100vh;
        }

        /* =========================
            HEADER
        ========================== */

        /* HEADER ESTÁTICO */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
        }

        .header h1 { color: #c5a373; font-size: 2rem; margin: 0; }

        /* CONTENEDOR DE BÚSQUEDA */
        .search-container {
            padding: 20px 5%;
            display: flex;
            justify-content: left;
        }

        .search-bar {
            background-color: var(--beige-botones);
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .search-bar input {
            background: none; border: none; outline: none; width: 100%;
            font-size: 1rem; color: #5d3a1a;
        }

        /* GRID DE TARJETAS (ESCRITORIO) */
        .allTarjetas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px 30px;
        }

        .tarjeta {
            background-color: white;
            color: black;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .info h3, .info h4 { margin: 5px 0; font-size: 1rem; }
        .info span { font-weight: normal; }

        .btn-crear {
            background-color: var(--beige-botones);
            color: #5d3a1a;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
        }

        /* ==========================================
           SOLO RESPONSIVE (Móvil)
        ========================================== */
        @media (max-width: 600px) {
            /* 1. Barra de búsqueda fija SOLO en móvil */
            .search-container {
                position: sticky;
                top: 0;
                z-index: 1000;
                background-color: var(--cafe-fondo);
                padding: 10px 20px;
            }

            .header h1 { font-size: 1.2rem; }

            /* 2. Evitar sobrecarga: Tarjetas tipo "Lista Compacta" */
            .allTarjetas {
                grid-template-columns: 1fr;
                padding: 10px 15px;
                gap: 10px;
            }

            .tarjeta {
                padding: 15px;
                border-radius: 15px;
                display: flex;
                flex-direction: column;
                border-left: 5px solid var(--beige-botones);
            }

            /* Reducimos el tamaño del texto para que no sature */
            .info h3 { font-size: 1.1rem; color: var(--cafe-fondo); }
            .info h4 { 
                font-size: 0.85rem; 
                display: inline-block; 
                margin-right: 10px; 
                color: #666;
            }

            .encabezado-contenido {
                flex-direction: column;
                text-align: center;
                margin: 0 0 15px 0 !important;
            }
        }

        /* Ajuste para tablets */
        @media (min-width: 601px) and (max-width: 900px) {
            .allTarjetas { grid-template-columns: repeat(2, 1fr); }
        }
    </style>

</head>

<body>

    <div class="header">
        <img src="{% static 'logo.jpeg' %}" alt="Logo" height="60px">
        <h1>TECNOCAPRINOS</h1>
        <a href="{% url 'dashboard' %}">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="#c5a373"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
        </a>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="Buscar cabra...">
        </div>
    </div>

    <div class="contenido">
        <div class="encabezado-contenido" style="display: flex; justify-content: space-between; align-items: center; padding: 0 30px;">
            <h2 style="font-size: 1.8rem;">Cabras Registradas</h2>
            <a href="{% url 'anadir' %}" class="btn-crear">➕ Nueva Cabra</a>
        </div>

        <div class="allTarjetas">
            {% for cabra in cabras %}
            <div class="tarjeta">
                <div class="info"><h3>{{ cabra.nombre }}</h3></div>
                <div class="info"><h4>Cod: <span>{{ cabra.codigo }}</span></h4></div>
                <div class="info"><h4>Raza: <span>{{ cabra.raza }}</span></h4></div>
                <div class="info"><h4>Sexo: <span>{{ cabra.sexo }}</span></h4></div>
                <div class="info"><h4>Nac: <span>{{ cabra.fecha_nacimiento }}</span></h4></div>
            </div>
            {% endfor %}

        </div>

        <!-- BOTÓN VOLVER -->

        <div class="bottom-actions">

            <a href="{% url 'info_animales' %}" class="btn-volver">
                Volver
            </a>

        </div>

        <a href="{% url 'info_animales' %}" style="color: white; margin: 30px; display: block; text-decoration: none; font-weight: bold;">⬅ VOLVER</a>
    </div>

</body>
</html>
