<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoCaprinos - Registro</title>
    <link rel="icon" href="{% static 'logo.jpeg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* (Mantenemos tus estilos originales intactos) */
        :root {
            --bg-principal: #C9A06D;
            --bg-cuadros: #EAD4B8;
            --color-trazos: #7F5637;
            --white: #f8f8f8;
        }

        body {
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-principal);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .white-header {
            width: 100%;
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--color-trazos);
        }

        .logo-container img { height: 60px; }

        .header-title {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--bg-cuadros);
            -webkit-text-stroke: 1.5px var(--color-trazos);
            margin: 0;
        }

        .navbar {
            width: 100%;
            background-color: var(--color-trazos);
            display: flex;
            justify-content: center;
            padding: 5px 0;
            z-index: 20;
        }

        .dropdown { position: relative; display: inline-block; }

        .dropbtn {
            background-color: var(--color-trazos);
            color: white;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            text-transform: uppercase;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--bg-cuadros);
            min-width: 220px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 30;
            border: 3px solid var(--color-trazos);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: var(--color-trazos);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: 600;
        }

        .dropdown-content a:hover { background-color: #dcb894; }
        .dropdown:hover .dropdown-content { display: block; }

        .page-content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            padding: 50px 20px;
            max-width: 1200px;
            width: 90%;
            margin: auto;
            box-sizing: border-box;
        }

        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .section-title {
            color: var(--white);
            font-size: 3rem;
            margin-top: 0;
            margin-bottom: 20px;
            -webkit-text-stroke: 2.5px var(--color-trazos);
            text-transform: uppercase;
        }

        .image-placeholder {
            width: 100%;
            max-width: 450px;
            height: auto;
            border: 6px solid var(--color-trazos);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .welcome-text {
            color: var(--color-trazos);
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .form-container {
            flex: 1;
            background-color: var(--bg-cuadros);
            border: 6px solid var(--color-trazos);
            border-radius: 40px;
            padding: 40px;
            box-sizing: border-box;
            max-width: 600px;
        }

        .form-title {
            color: var(--white);
            font-size: 2.2rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            -webkit-text-stroke: 1.5px var(--color-trazos);
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }

        label {
            color: var(--color-trazos);
            font-weight: 600;
            margin-bottom: 6px;
            margin-left: 8px;
            font-size: 1rem;
        }

        input, select, textarea {
            background-color: var(--white);
            border: 3px solid var(--color-trazos);
            border-radius: 15px;
            padding: 10px 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            color: var(--color-trazos);
            outline: none;
        }

        .btn-submit {
            grid-column: span 2;
            background-color: var(--color-trazos);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s;
        }

        .btn-submit:hover { transform: scale(1.02); }

        .btn-volver {
            grid-column: span 2;
            background-color:#ab7b41;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .btn-volver:hover { transform: scale(1.02); }

        @media (max-width: 950px) {
            .page-content { flex-direction: column; align-items: center; gap: 30px; }
            .left-column, .form-container { width: 100%; max-width: 500px; }
        }
    </style>
</head>
<body>
    <div class="white-header">
        <div class="logo-container">
            <img src="{% static 'logo.jpeg' %}" alt="Logo TecnoCaprinos">
        </div>
        <h1 class="header-title">TECNOCAPRINOS</h1>
        <div style="width: 60px;"></div>
    </div>
    <div class="page-content">
        <div class="left-column">
            <h2 class="section-title">Bienvenido</h2>
            <div class="image-placeholder">
                <img src="{% static 'img1.webp' %}" alt="Cabra animada" style="width: 100%; max-width: 400px; border-radius: 20px;">
            </div>
            <p class="welcome-text">
                Hola, <strong>{{ user.username }}</strong>En esta sección puedes agregar nuevos integrantes a tu hato caprino.
            </p>
        </div>
        <div class="form-container">
            <h3 class="form-title">Edita los Datos de tu Cabra</h3>
            <form method="POST" class="form-grid">
                {% csrf_token %}
                <div class="form-group">
                    <label>Codigo:</label>
                    <input value="{{ cabra.codigo }}" type="text" name="nuevo-codigo" placeholder="Codigo de la Cabra" required>
                </div>
                <div class="form-group">
                    <label>Nombre:</label>
                    <input value="{{ cabra.nombre }}" type="text" name="nuevo-nombr" placeholder="Nombre de la Cabra" required>
                </div>
                <div class="form-group">
                    <label>Fecha de Nacimiento:</label>
                    <input value="{{ cabra.fecha_nacimiento }}" type="date" name="nueva-fecha_nacimiento" required>
                </div>
                <div class="form-group">
                    <label>Raza:</label>
                    <select name="raza" id="raza">
                        <option selected value="No Seleccionado">Seleccione una raza</option>
                        <option value="Boer">Boer</option>
                        <option value="Saanen">Saanen</option>
                        <option value="Alpina">Alpina</option>
                        <option value="Toggenburg">Toggenburg</option>
                        <option value="Anglonubiana">Anglonubiana</option>
                        <option value="LaMancha">LaMancha</option>
                        <option value="Murciano-Granadina">Murciano-Granadina</option>
                        <option value="Malagueña">Malagueña</option>
                        <option value="Florida">Florida</option>
                        <option value="Payoya">Payoya</option>
                        <option value="Jamnapari">Jamnapari</option>
                        <option value="Beetal">Beetal</option>
                        <option value="Black Bengal">Black Bengal</option>
                        <option value="Kiko">Kiko</option>
                        <option value="Savanna">Savanna</option>
                        <option value="Myotonic">Myotonic (Desmayadora)</option>
                        <option value="Nigerian Dwarf">Nigerian Dwarf</option>
                        <option value="Pygmy">Pygmy</option>
                        <option value="Oberhasli">Oberhasli</option>
                        <option value="Golden Guernsey">Golden Guernsey</option>
                        <option value="Angora">Angora</option>
                        <option value="Cashmere">Cashmere</option>
                        <option value="Criolla">Criolla</option>
                        <option value="Canaria">Canaria</option>
                        <option value="Verata">Verata</option>
                        <option value="Retinta">Retinta</option>
                        <option value="Blanca Celtibérica">Blanca Celtibérica</option>
                        <option value="Negra Serrana">Negra Serrana</option>
                        <option value="Grisona">Grisona</option>
                        <option value="Rove">Rove</option>
                        <option value="Poitevine">Poitevine</option>
                        <option value="Catalana">Catalana</option>
                        <option value="Corsa">Corsa</option>
                        <option value="Girgentana">Girgentana</option>
                        <option value="Damascus">Damascus</option>
                        <option value="Bionda dell’Adamello">Bionda dell’Adamello</option>
                        <option value="Appenzell">Appenzell</option>
                        <option value="Valais Blackneck">Valais Blackneck</option>
                        <option value="Peacock">Peacock</option>
                        <option value="Bagot">Bagot</option>
                        <option value="Feral">Feral</option>
                        <option value="West African Dwarf">West African Dwarf</option>
                        <option value="Barbari">Barbari</option>
                        <option value="Osmanabadi">Osmanabadi</option>
                        <option value="Sirohi">Sirohi</option>
                        <option value="Jakhrana">Jakhrana</option>
                        <option value="Kutchi">Kutchi</option>
                        <option value="Marwari">Marwari</option>
                        <option value="Changthangi">Changthangi</option>
                        <option value="Pashmina">Pashmina</option>
                        <option value="Boer Cruzada">Boer Cruzada</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Peso (en Libras):</label>
                    <input type="number" name="nuevo-peso" min="0" placeholder="Peso en Libras" required>
                </div>
                <div class="form-group">
                    <label>Sexo:</label>
                    <select name="nuevo-sexo" required>
                        <option selected>Seleccione...</option>
                        <option value="M">Macho (Cabro)</option>
                        <option value="F">Hembra (Cabra)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Color:</label>
                    <select name="nuevo-color" required>
                        <option selected>Seleccione...</option>
                        <option value="blanco">Blanco</option>
                        <option value="negro">Negro</option>
                        <option value="marron">Marrón</option>
                        <option value="gris">Gris</option>
                        <option value="beige">Beige</option>
                        <option value="manchado">Manchado</option>
                        <option value="tricolor">Tricolor</option>
                        <option value="pinto">Pinto</option>
                        <option value="rojizo">Rojizo</option>
                        <option value="crema">Crema</option>
                        <option value="atigrado">Atigrado</option>
                        <option value="moteado">Moteado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Codigo de la Madre:</label>
                    <input type="text" name="nuevo-cod_madre" placeholder="Codigo de la Cabra Madre" required>
                </div>
                <div class="form-group">
                    <label>Codigo del Padre:</label>
                    <input type="text" name="nuevo-cod_padre" placeholder="Codigo del Cabro Padre" required>
                </div>
                <div class="form-group">
                    <label>Categoria:</label>
                        <select name="nueva-categoria" id="categoria">
                        <option selected>Seleciona una Categoria</option>
                        <option value="cinta">En Cinta</option>
                        <option value="enferma">Enferma</option>
                        <option value="vacunas">Vacunas</option>
                        <option value="produccion">Producción</option>
                        <option value="">Ninguno</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">GUARDAR REGISTRO</button>
                <a href="{% url 'info_animales' %}" class="btn-volver">VOLVER</a>
            </form>
        </div>
    </div>
</body>
</html>
