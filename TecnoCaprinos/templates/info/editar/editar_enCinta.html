<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoCaprinos - Editar</title>
    <link rel="icon" href="{% static 'logo.jpeg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* (Mantenemos tus estilos originales intactos) */
        :root {
            --bg-principal: #C9A06D;
            --bg-cuadros: #EAD4B8;
            --color-trazos: #7F5637;
            --white: #f8f8f8;
        }

        body {
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-principal);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .white-header {
            width: 100%;
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--color-trazos);
        }

        .logo-container img {
            height: 60px;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--bg-cuadros);
            -webkit-text-stroke: 1.5px var(--color-trazos);
            margin: 0;
        }

        .navbar {
            width: 100%;
            background-color: var(--color-trazos);
            display: flex;
            justify-content: center;
            padding: 5px 0;
            z-index: 20;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background-color: var(--color-trazos);
            color: white;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            text-transform: uppercase;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--bg-cuadros);
            min-width: 220px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 30;
            border: 3px solid var(--color-trazos);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: var(--color-trazos);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: 600;
        }

        .dropdown-content a:hover {
            background-color: #dcb894;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .page-content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            padding: 50px 20px;
            max-width: 1200px;
            width: 90%;
            margin: auto;
            box-sizing: border-box;
        }

        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .section-title {
            color: var(--white);
            font-size: 3rem;
            margin-top: 0;
            margin-bottom: 20px;
            -webkit-text-stroke: 2.5px var(--color-trazos);
            text-transform: uppercase;
        }

        .image-placeholder {
            width: 100%;
            max-width: 450px;
            height: auto;
            border: 6px solid var(--color-trazos);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .welcome-text {
            color: var(--color-trazos);
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .form-container {
            flex: 1;
            background-color: var(--bg-cuadros);
            border: 6px solid var(--color-trazos);
            border-radius: 40px;
            padding: 40px;
            box-sizing: border-box;
            max-width: 600px;
        }

        .form-title {
            color: var(--white);
            font-size: 2.2rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            -webkit-text-stroke: 1.5px var(--color-trazos);
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            color: var(--color-trazos);
            font-weight: 600;
            margin-bottom: 6px;
            margin-left: 8px;
            font-size: 1rem;
        }

        input,
        select,
        textarea {
            background-color: var(--white);
            border: 3px solid var(--color-trazos);
            border-radius: 15px;
            padding: 10px 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            color: var(--color-trazos);
            outline: none;
            box-sizing: border-box;
        }

        .btn-submit {
            grid-column: span 2;
            background-color: var(--color-trazos);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: scale(1.02);
        }

        .btn-volver {
            grid-column: span 2;
            background-color: #ab7b41;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .btn-volver:hover {
            transform: scale(1.02);
        }

        .form-group h1{
            color: #7F5637;
            font-size: 20px;
            background-color: var(--white);
            border: 3px solid var(--color-trazos);
            border-radius: 15px;
            padding: 10px 15px;
            font-family: 'Fredoka', sans-serif;
            color: var(--color-trazos);
        }

        @media (max-width: 950px) {
            .page-content {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                padding: 30px 15px;
            }

            .left-column,
            .form-container {
                width: 100%;
                max-width: 550px;
            }
        }

        /* --- OPTIMIZACIONES RESPONSIVE ADICIONALES --- */

        @media (max-width: 768px) {
            .white-header {
                padding: 10px 20px;
            }

            .header-title {
                font-size: 1.5rem;
                -webkit-text-stroke: 1px var(--color-trazos);
            }

            .logo-container img {
                height: 45px;
            }

            .section-title {
                font-size: 2.2rem;
                -webkit-text-stroke: 1.5px var(--color-trazos);
            }

            .form-container {
                padding: 25px;
                border-radius: 30px;
                border-width: 4px;
            }

            .form-title {
                font-size: 1.6rem;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 480px) {
            .white-header {
                padding: 10px 15px;
            }

            .header-title {
                font-size: 1.1rem;
            }

            .logo-container img {
                height: 35px;
            }

            /* Hacemos que la cuadrícula pase a una sola columna en móviles pequeños */
            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .form-group {
                grid-column: span 1 !important;
            }

            .btn-submit,
            .btn-volver {
                grid-column: span 1;
                font-size: 1rem;
                padding: 10px;
            }

            .image-placeholder {
                border-width: 4px;
                border-radius: 20px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="white-header">
        <div class="logo-container">
            <img src="{% static 'logo.jpeg' %}" alt="Logo TecnoCaprinos">
        </div>
        <h1 class="header-title">TECNOCAPRINOS</h1>
        <div style="width: 60px;" class="header-spacer"></div>
    </div>
    <div class="page-content">
        <div class="form-container">
            <h3 class="form-title">Edita los Datos de tu Cabra</h3>
            <form method="POST" class="form-grid">
                {% csrf_token %}
                <div class="form-group">
                    <label>Codigo:</label>
                    <h1>{{ cabra.codigo }}</h1>
                    <input type="hidden" name="codigo" value="{{ cabra.codigo }}">
                </div>
                <div class="form-group">
                    <label>Nombre:</label>
                    <h1>{{ cabra.nombre }}</h1>
                    <input type="hidden" name="nombre" value="{{ cabra.nombre }}">
                </div>
                <div class="form-group">
                    <label>Fecha de Nacimiento:</label>
                    <h1>{{ cabra.fecha_nacimiento }}</h1>
                    <input type="hidden" name="fecha_nacimiento" value="{{ cabra.fecha_nacimiento }}">
                </div>
                <div class="form-group">
                    <label>Raza:</label>
                    <h1>{{ cabra.raza }}</h1>
                    <input type="hidden" name="raza" value="{{ cabra.raza }}">
                </div>
                <div class="form-group">
                    <label>Peso (en Libras):</label>
                    <h1>{{ cabra.peso }}</h1>
                    <input type="hidden" name="peso" value="{{ cabra.peso }}">
                </div>
                <div class="form-group">
                    <label>Color:</label>
                    <h1>{{ cabra.color }}</h1>
                    <input type="hidden" name="color" value="{{ cabra.color }}">
                </div>
                <div class="form-group">
                    <label>Codigo de la Madre:</label>
                    <h1>{{ cabra.codigo_madre }}</h1>
                    <input type="hidden" name="cod_madre" value="{{ cabra.codigo_madre }}">
                </div>
                <div class="form-group">
                    <label>Codigo del Padre:</label>
                    <h1>{{ cabra.codigo_padre }}</h1>
                    <input type="hidden" name="cod_padre" value="{{ cabra.codigo_padre }}">
                </div>
                <div class="dorm-group">
                    <label>Mes de Gestación:</label>
                    <select name="mes_gestacion">
                        <option value="{{ cabra.mes_gestacion }}">Mes {{ cabra.mes_gestacion }}</option>
                        <option value="1">Mes 1</option>
                        <option value="2">Mes 2</option>
                        <option value="3">Mes 3</option>
                        <option value="4">Mes 4</option>
                        <option value="5">Mes 5</option>
                    </select>
                </div>
                <div class="dorm-group">
                    <label>Estado de Gestación:</label>
                    <select name="estado_gestacion">
                        <option value="{{ cabra.estado_gestacion }}">{{ cabra.estado_gestacion }}</option>
                        <option value="gestacion temprana">Gestación temprana (0 - 50 días)</option>
                        <option value="gestacion media">Gestación media (51 - 100 días)</option>
                        <option value="gestacion avanzada">Gestación avanzada (101 - 150 días)</option>
                        <option value="preparto">Preparto</option>
                    </select>
                </div>
                <div class="dorm-group">
                    <label>Peso Actual (lb):</label>
                    <input value="{{ cabra.peso_actual }}" type="text" name="peso_actual" placeholder="Peso Actual (en Libras)" required>
                </div>
                <div class="dorm-group">
                    <label>Veterinario Responsable:</label>
                    <input value="{{ cabra.veterinario_responsable }}" type="text" name="veterinario_responsable" placeholder="Veterinario Responsable" required>
                </div>
                <button type="submit" class="btn-submit">GUARDAR REGISTRO</button>
                <a href="{% url 'info_animales' %}" class="btn-volver">VOLVER</a>
            </form>
        </div>
    </div>
</body>
</html>
